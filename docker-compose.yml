services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: contract_one
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d contract_one"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: contract_one
      DB_USER: appuser
      DB_PASSWORD: apppassword
      JWT_SECRET: local-dev-secret-key-change-in-production
      JWT_ISSUER: ktor-contract-api
      JWT_AUDIENCE: ktor-contract-api
      JWT_EXPIRES_IN_SECONDS: "3600"
      LOG_FORMAT: json
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
